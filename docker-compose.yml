services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rodizio_organistas
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro

  web:
    build: .
    depends_on:
      - mysql
    environment:
      ConnectionStrings__DefaultConnection: server=mysql;port=3306;database=rodizio_organistas;user=root;password=root
      Authentication__Admin__Username: ${AUTH_ADMIN_USERNAME}
      Authentication__Admin__PasswordHash: ${AUTH_ADMIN_PASSWORD_HASH}
    ports:
      - "5000:5000"

volumes:
  mysql_data:
